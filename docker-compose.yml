version: "3.8"

networks:
  ecommerce-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  zk-data:
  elasticsearch-data:

services:
  # ===== Infrastructure =====
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce_pass
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/auth-service/db/init.sql:/docker-entrypoint-initdb.d/01-auth.sql
      - ./src/user-service/db/init.sql:/docker-entrypoint-initdb.d/02-user.sql
      - ./src/product-service/db/init.sql:/docker-entrypoint-initdb.d/03-product.sql
      - ./src/order-service/db/init.sql:/docker-entrypoint-initdb.d/04-order.sql
      - ./src/inventory-service/db/init.sql:/docker-entrypoint-initdb.d/05-inventory.sql
      - ./src/cart-service/db/init.sql:/docker-entrypoint-initdb.d/06-cart.sql
      - ./src/payment-service/db/init.sql:/docker-entrypoint-initdb.d/07-payment.sql
      - ./src/notification-service/db/init.sql:/docker-entrypoint-initdb.d/08-notification.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass redis_pass
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ecommerce-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ecommerce-zk
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zk-data:/var/lib/zookeeper/data
    networks:
      - ecommerce-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ecommerce-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  # ===== Microservices =====
  auth-service:
    build:
      context: ./src/auth-service
      dockerfile: Dockerfile
    container_name: ecommerce-auth
    ports:
      - "4001:4001"
    environment:
      NODE_ENV: development
      PORT: 4001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ecommerce
      DB_PASSWORD: ecommerce_pass
      DB_NAME: ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_pass
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-net

  user-service:
    build:
      context: ./src/user-service
      dockerfile: Dockerfile
    container_name: ecommerce-user
    ports:
      - "4002:4002"
    environment:
      NODE_ENV: development
      PORT: 4002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ecommerce
      DB_PASSWORD: ecommerce_pass
      DB_NAME: ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_pass
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-net

  product-service:
    build:
      context: ./src/product-service
      dockerfile: Dockerfile
    container_name: ecommerce-product
    ports:
      - "4003:4003"
    environment:
      NODE_ENV: development
      PORT: 4003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ecommerce
      DB_PASSWORD: ecommerce_pass
      DB_NAME: ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_pass
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-net

  cart-service:
    build:
      context: ./src/cart-service
      dockerfile: Dockerfile
    container_name: ecommerce-cart
    ports:
      - "4004:4004"
    environment:
      NODE_ENV: development
      PORT: 4004
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ecommerce
      DB_PASSWORD: ecommerce_pass
      DB_NAME: ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_pass
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-net

  order-service:
    build:
      context: ./src/order-service
      dockerfile: Dockerfile
    container_name: ecommerce-order
    ports:
      - "4005:4005"
    environment:
      NODE_ENV: development
      PORT: 4005
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ecommerce
      DB_PASSWORD: ecommerce_pass
      DB_NAME: ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_pass
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-net

  payment-service:
    build:
      context: ./src/payment-service
      dockerfile: Dockerfile
    container_name: ecommerce-payment
    ports:
      - "4006:4006"
    environment:
      NODE_ENV: development
      PORT: 4006
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ecommerce
      DB_PASSWORD: ecommerce_pass
      DB_NAME: ecommerce
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-net

  inventory-service:
    build:
      context: ./src/inventory-service
      dockerfile: Dockerfile
    container_name: ecommerce-inventory
    ports:
      - "4007:4007"
    environment:
      NODE_ENV: development
      PORT: 4007
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ecommerce
      DB_PASSWORD: ecommerce_pass
      DB_NAME: ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_pass
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-net

  notification-service:
    build:
      context: ./src/notification-service
      dockerfile: Dockerfile
    container_name: ecommerce-notification
    ports:
      - "4008:4008"
    environment:
      NODE_ENV: development
      PORT: 4008
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ecommerce
      DB_PASSWORD: ecommerce_pass
      DB_NAME: ecommerce
      KAFKA_BROKERS: kafka:9092
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-net

  api-gateway:
    build:
      context: ./src/api-gateway
      dockerfile: Dockerfile
    container_name: ecommerce-gateway
    ports:
      - "80:80"
    environment:
      AUTH_SERVICE_URL: http://auth-service:4001
      USER_SERVICE_URL: http://user-service:4002
      PRODUCT_SERVICE_URL: http://product-service:4003
      CART_SERVICE_URL: http://cart-service:4004
      ORDER_SERVICE_URL: http://order-service:4005
      PAYMENT_SERVICE_URL: http://payment-service:4006
      INVENTORY_SERVICE_URL: http://inventory-service:4007
      NOTIFICATION_SERVICE_URL: http://notification-service:4008
      FRONTEND_URL: http://frontend:3000
    depends_on:
      - auth-service
      - user-service
      - product-service
      - cart-service
      - order-service
      - payment-service
      - inventory-service
      - notification-service
    networks:
      - ecommerce-net

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /
    container_name: ecommerce-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: /
    depends_on:
      - api-gateway
    networks:
      - ecommerce-net

  # ===== Monitoring =====
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: ecommerce-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/rules:/etc/prometheus/rules
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - ecommerce-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: ecommerce-grafana
    ports:
      - "3030:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - ecommerce-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: ecommerce-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - ecommerce-net

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: ecommerce-logstash
    ports:
      - "5000:5000"
    volumes:
      - ./monitoring/elk/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    depends_on:
      - elasticsearch
    networks:
      - ecommerce-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: ecommerce-kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - ecommerce-net

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: ecommerce-jaeger
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - ecommerce-net

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: ecommerce-mailhog
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - ecommerce-net
